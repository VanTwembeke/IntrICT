<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Template</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: #1e293b;
      background: linear-gradient(135deg, #f1f5f9 0%, #e0e7ff 100%);
    }
    .container {
      max-width: 600px;
      margin: 20px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    .content {
      padding: 40px;
    }
    .greeting {
      margin-bottom: 20px;
      font-size: 16px;
      color: #1e293b;
    }
    .greeting strong {
      color: #3b82f6;
    }
    .message {
      background: #f8fafc;
      border-left: 4px solid #3b82f6;
      padding: 20px;
      margin: 20px 0;
      border-radius: 6px;
      line-height: 1.8;
    }
    .signature {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
      color: #64748b;
      font-size: 14px;
    }
    .signature strong {
      color: #1e293b;
      display: block;
      margin-bottom: 5px;
    }
    .footer {
      background: #f8fafc;
      padding: 20px;
      text-align: center;
      color: #64748b;
      font-size: 12px;
      border-top: 1px solid #e2e8f0;
    }
    .footer a {
      color: #3b82f6;
      text-decoration: none;
    }
    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: white;
      padding: 12px 30px;
      border-radius: 6px;
      text-decoration: none;
      margin: 20px 0;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .cta-button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{SUBJECT}}</h1>
      <p>Bericht van {{SENDER_NAME}}</p>
    </div>
    
    <div class="content">
      <div class="greeting">
        Hallo <strong>{{RECIPIENT_NAME}}</strong>,
      </div>
      
      <div class="message">
        {{MESSAGE}}
      </div>
      
      <div class="signature">
        <strong>{{SENDER_NAME}}</strong>
        <span>{{SENDER_COMPANY}}</span>
      </div>
    </div>
    
    <div class="footer">
      <p>Dit is een automatisch gegenereerd e-mailbericht. Antwoord alstublieft niet direct op deze e-mail.</p>
      <p>&copy; 2026 {{APP_NAME}}. Alle rechten voorbehouden.</p>
    </div>
  </div>
</body>
</html>
